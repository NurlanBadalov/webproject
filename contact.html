    <header>
      <h1>
        <a href="index.html">წისქვილი</a>

      <nav>
        <ul>

        </ul>
      </nav>
      <button id="btn"><img src="images/icon.png" alt="" /></button>
      <h2>
        <a href="index.html">წისქვილი</a>
      </h2>
    </header>

    <main>
      <h2 class="h2">კონტაქტი</h2>

      <div class="contact">
        <p>დასაჯავშნად დაგვირეკეთ</p>
        <h3>+995 555 12 34 56</h3>
      </div>
      <div class="map">
        <form class="input">
          <div class="form-group">
            <label for="name">სახელი:</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="თქვენი სახელი"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">ელ-ფოსტა:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@mail.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="message">შეტყობინება:</label>
            <textarea
              id="message"
              name="message"
              rows="4"
              placeholder="თქვენი შეტყობინება"
            ></textarea>
          </div>
          <button type="submit">გაგზავნა</button>
        </form>
        <div class="mapouter">
          <iframe
            src="https://maps.google.com/maps?q=ganivi&t=&z=14&ie=UTF8&iwloc=&output=embed"
            class="map-frame"
          ></iframe>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-info">
        <p><i class="fas fa-phone"></i> +995 555 12 34 56</p>
        <p><i class="fas fa-envelope"></i> lorem@ipsum.com</p>
        <p><i class="fas fa-map-marker-alt"></i> University St, Tbilisi</p>
      </div>
      <ul class="icons">
        <li>
          <a href="#"><img src="icons/fb.png" alt="ico" /></a>
        </li>
        <li>
          <a href="#"><img src="icons/wp.png" alt="ico" /></a>
        </li>
        <li>
          <a href="#"><img src="icons/x.png" alt="ico" /></a>
        </li>
      </ul>
    </footer>

    <script src="sript.js"></script>
  </body>
</html>
